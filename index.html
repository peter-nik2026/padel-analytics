<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Padel Video Analyzer PRO</title>

<style>
body{
  background:#0f0f12;
  color:white;
  font-family:Arial;
  padding:20px;
}

h1{margin-bottom:20px}

video{
  width:100%;
  max-height:420px;
  background:black;
}

.container{
  position:relative;
}

#overlay{
  position:absolute;
  inset:0;
  cursor:crosshair;
}

#marker{
  position:absolute;
  width:18px;
  height:18px;
  background:red;
  border-radius:50%;
  border:2px solid white;
  transform:translate(-50%,-50%);
  display:none;
}

.timeline{
  margin-top:20px;
}

input[type=range]{
  width:100%;
}

button{
  margin-top:15px;
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:#00ff9c;
  font-weight:bold;
  cursor:pointer;
}

.session{
  background:#1e1e23;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>Analyse Action Padel</h1>

<input type="file" id="videoInput" accept="video/*">

<div class="container">
  <video id="video" controls></video>
  <div id="overlay"></div>
  <div id="marker"></div>
</div>

<h3>Sélection de l'action</h3>

<div class="timeline">
  Début :
  <input type="range" id="startRange" min="0" step="0.1" value="0">
  Fin :
  <input type="range" id="endRange" min="0" step="0.1" value="0">
</div>

<div id="timeInfo"></div>

<button onclick="analyze()">Analyser l'action</button>

<h2>Résultat</h2>
<div id="result"></div>

<h2>Historique</h2>
<div id="sessions"></div>

<script>

let selectedPlayer=null

const video=document.getElementById("video")
const overlay=document.getElementById("overlay")
const marker=document.getElementById("marker")

const startRange=document.getElementById("startRange")
const endRange=document.getElementById("endRange")
const timeInfo=document.getElementById("timeInfo")

document.getElementById("videoInput").addEventListener("change",function(){

const file=this.files[0]

if(file){
video.src=URL.createObjectURL(file)

video.onloadedmetadata=function(){

startRange.max=video.duration
endRange.max=video.duration
endRange.value=video.duration

updateTimeInfo()

}

}

})

overlay.addEventListener("click",function(e){

const rect=overlay.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

marker.style.left=x+"px"
marker.style.top=y+"px"
marker.style.display="block"

selectedPlayer={x,y}

})

startRange.addEventListener("input",updateTimeInfo)
endRange.addEventListener("input",updateTimeInfo)

function updateTimeInfo(){

const start=parseFloat(startRange.value)
const end=parseFloat(endRange.value)

timeInfo.innerHTML=
`
Début : ${start.toFixed(2)} s<br>
Fin : ${end.toFixed(2)} s<br>
Durée : ${(end-start).toFixed(2)} s
`

}

function analyze(){

const start=parseFloat(startRange.value)
const end=parseFloat(endRange.value)

if(!selectedPlayer){
alert("Sélectionne un joueur")
return
}

if(end<=start){
alert("Fin doit être après début")
return
}

const duration=end-start

const score=70+Math.floor(Math.random()*20)
const winners=10+Math.floor(Math.random()*6)
const precision=70+Math.floor(Math.random()*20)

document.getElementById("result").innerHTML=
`
<div class="session">
Score : ${score}<br>
Action : ${start.toFixed(2)}s → ${end.toFixed(2)}s<br>
Durée : ${duration.toFixed(2)}s<br>
Winners : ${winners}<br>
Précision : ${precision}%
</div>
`

saveSession(score,winners,precision,duration)

}

function saveSession(score,winners,precision,duration){

let sessions=JSON.parse(localStorage.getItem("sessions_v12")||"[]")

sessions.push({
date:new Date().toLocaleString(),
score,
winners,
precision,
duration
})

localStorage.setItem("sessions_v12",JSON.stringify(sessions))

renderSessions()

}

function renderSessions(){

const container=document.getElementById("sessions")

const sessions=JSON.parse(localStorage.getItem("sessions_v12")||"[]")

container.innerHTML=""

sessions.reverse().forEach(s=>{

container.innerHTML+=`
<div class="session">
Score ${s.score}<br>
Durée ${s.duration.toFixed(2)}s<br>
Winners ${s.winners} • Précision ${s.precision}%<br>
${s.date}
</div>
`

})

}

renderSessions()

</script>

</body>
</html>
