<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Padel Video Analyzer V11</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}
video{
  width:100%;
  max-height:420px;
  background:black;
}
#videoContainer{
  position:relative;
}
#overlay{
  position:absolute;
  inset:0;
  z-index:2;
  cursor:crosshair;
  display:none;
}
#marker{
  position:absolute;
  width:20px;
  height:20px;
  background:red;
  border-radius:50%;
  border:2px solid white;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
  z-index:3;
}
button{
  margin-top:10px;
  margin-right:6px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#00ff9c;
  font-weight:bold;
  cursor:pointer;
}
button.secondary{
  background:#333;
  color:white;
}
.info{
  margin-top:10px;
  padding:10px;
  background:#1d1d1d;
  border-radius:8px;
}
.session{
  background:#222;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  font-size:13px;
}
</style>
</head>
<body>

<h1>Analyse action padel</h1>

<input type="file" id="videoInput" accept="video/*">

<div id="videoContainer">
  <video id="video" controls></video>
  <div id="overlay"></div>
  <div id="marker"></div>
</div>

<button id="selectModeBtn" class="secondary">
Mode sélection joueur
</button>

<div class="info" id="statusBox">
Joueur : non sélectionné<br>
Début : -<br>
Fin : -
</div>

<button id="btnStart">Marquer début</button>
<button id="btnEnd">Marquer fin</button>
<button id="btnAnalyze">Analyser action</button>

<h2>Résultat</h2>
<div id="result"></div>

<h2>Historique</h2>
<div id="sessions"></div>

<script>
let selectedPlayer=null;
let startTime=null;
let endTime=null;
let selectMode=false;

const video=document.getElementById("video");
const overlay=document.getElementById("overlay");
const marker=document.getElementById("marker");
const statusBox=document.getElementById("statusBox");
const result=document.getElementById("result");
const selectBtn=document.getElementById("selectModeBtn");

document.getElementById("videoInput").addEventListener("change",function(){
  const file=this.files[0];
  if(file){
    video.src=URL.createObjectURL(file);
    selectedPlayer=null;
    startTime=null;
    endTime=null;
    marker.style.display="none";
    result.innerHTML="";
    updateStatus();
  }
});

/* MODE SELECTION JOUEUR */

selectBtn.addEventListener("click",function(){
  selectMode=!selectMode;

  if(selectMode){
    overlay.style.display="block";
    selectBtn.textContent="Quitter sélection";
  }else{
    overlay.style.display="none";
    selectBtn.textContent="Mode sélection joueur";
  }
});

/* SELECTION JOUEUR */

overlay.addEventListener("click",function(e){
  if(!video.src) return;

  const rect=overlay.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;

  marker.style.left=x+"px";
  marker.style.top=y+"px";
  marker.style.display="block";

  selectedPlayer={x,y};
  updateStatus();
});

/* MARQUAGE TEMPS */

document.getElementById("btnStart").addEventListener("click",function(){
  if(!video.src){
    alert("Importe une vidéo");
    return;
  }
  startTime=video.currentTime;
  updateStatus();
  alert("Début marqué à "+startTime.toFixed(2)+"s");
});

document.getElementById("btnEnd").addEventListener("click",function(){
  if(!video.src){
    alert("Importe une vidéo");
    return;
  }
  endTime=video.currentTime;
  updateStatus();
  alert("Fin marquée à "+endTime.toFixed(2)+"s");
});

/* ANALYSE */

document.getElementById("btnAnalyze").addEventListener("click",function(){

  if(!video.src){
    alert("Importe une vidéo");
    return;
  }

  if(!selectedPlayer){
    alert("Sélectionne un joueur");
    return;
  }

  if(startTime===null||endTime===null||endTime<=startTime){
    alert("Marque début et fin correctement");
    return;
  }

  const duration=endTime-startTime;

  const score=70+Math.floor(Math.random()*20);
  const winners=10+Math.floor(Math.random()*6);
  const precision=70+Math.floor(Math.random()*20);

  result.innerHTML=`
  <div class="session">
  <b>Score :</b> ${score}<br>
  <b>Action :</b> ${startTime.toFixed(2)}s → ${endTime.toFixed(2)}s (${duration.toFixed(2)}s)<br>
  <b>Winners :</b> ${winners}<br>
  <b>Précision :</b> ${precision}%
  </div>
  `;

  saveSession(score,winners,precision,duration);
});

/* STATUS */

function updateStatus(){
  statusBox.innerHTML=`
  Joueur : ${selectedPlayer?"sélectionné":"non sélectionné"}<br>
  Début : ${startTime!==null?startTime.toFixed(2)+"s":"-"}<br>
  Fin : ${endTime!==null?endTime.toFixed(2)+"s":"-"}
  `;
}

/* STOCKAGE */

function saveSession(score,winners,precision,duration){
  let sessions=JSON.parse(localStorage.getItem("sessions_v11")||"[]");
  sessions.push({
    date:new Date().toLocaleString(),
    score,
    winners,
    precision,
    duration
  });
  localStorage.setItem("sessions_v11",JSON.stringify(sessions));
  renderSessions();
}

function renderSessions(){
  const container=document.getElementById("sessions");
  const sessions=JSON.parse(localStorage.getItem("sessions_v11")||"[]");
  container.innerHTML="";
  sessions.slice().reverse().forEach(s=>{
    container.innerHTML+=`
    <div class="session">
    <b>Score ${s.score}</b> • ${s.date}<br>
    Durée action : ${s.duration.toFixed(2)}s<br>
    Winners ${s.winners} • Précision ${s.precision}%
    </div>
    `;
  });
}

renderSessions();
updateStatus();
</script>

</body>
</html>
